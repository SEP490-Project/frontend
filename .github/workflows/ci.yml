name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - staging
      - pre-staging
  pull_request:
    branches:
      - main
      - dev
      - staging
      - pre-staging

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run ESLint
      - name: Run ESLint
        run: npm run lint

      # 5. Run Prettier check
      - name: Run Prettier check
        run: npm run format:check

      # 7. Build project
      - name: Build project
        run: npm run build

